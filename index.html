<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MEsports — подбор размера</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f0efe9;--text2:#a8a7a2;--text3:#5a5a56;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --blue-bg:#0a1e35;--blue:#378add;--blue-text:#85b7eb;
  --success-bg:#173404;--success:#97c459;
  --warn-bg:#2d1a02;--warn:#ef9f27;
  --r-md:8px;--r-lg:14px;--r-xl:18px;
}
html,body{width:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{width:100%;max-width:480px;margin:0 auto;padding:1.25rem 1rem 3rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border);gap:8px}
.logo-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.logo-img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.logo-name{font-size:15px;font-weight:500;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.badge{background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.badge i{font-size:13px;color:var(--warn)}
.slbl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:9px}
.params{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.pb{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:12px}
.pl{font-size:11px;color:var(--text3);margin-bottom:4px}
.pv{font-size:24px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1}
.pu{font-size:12px;font-weight:400;color:var(--text3)}
.pslider{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg4);border-radius:2px;outline:none;cursor:pointer;touch-action:pan-y;display:block;margin-bottom:8px}
.pslider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--text);cursor:pointer}
.pslider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--text);border:none;cursor:pointer}
.pnum{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r-md);color:var(--text);font-size:15px;font-weight:500;padding:8px 10px;text-align:center;outline:none;-moz-appearance:textfield;display:block}
.pnum::-webkit-inner-spin-button{-webkit-appearance:none}
.pnum:focus{border-color:rgba(255,255,255,0.4)}
.fprow{display:flex;gap:7px;margin-bottom:1.5rem}
.fpb{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-md);padding:9px 4px;cursor:pointer;text-align:center;font-size:12px;color:var(--text2);transition:all .15s}
.fpb.active{background:var(--bg3);border-color:var(--border2);color:var(--text);font-weight:500}
.catrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.cb{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:11px;cursor:pointer;text-align:left;transition:all .2s}
.cb.active{border:1.5px solid var(--blue);background:var(--blue-bg)}
.cbn{font-size:12px;font-weight:500;color:var(--text);display:block}
.cb.active .cbn{color:var(--blue-text)}
.cbs{font-size:10px;color:var(--text3);display:block;margin-top:2px}
.result-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-xl);padding:1.25rem;margin-bottom:1rem}
.result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.result-name{font-size:15px;font-weight:500;color:var(--text)}
.result-colors{font-size:12px;color:var(--text3);margin-top:3px}
.sbadge{font-size:44px;font-weight:500;color:var(--blue-text);line-height:1;display:inline-block}
.sbadge.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}
.fit-divider{height:0.5px;background:var(--border);margin-bottom:12px}
.fit-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.fit-lbl{font-size:12px;color:var(--text2)}
.fchip{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}
.ft{background:var(--warn-bg);color:var(--warn)}
.fn{background:var(--success-bg);color:var(--success)}
.fl{background:var(--bg3);color:var(--text2)}
.pips{display:flex;gap:5px;margin-bottom:12px}
.pip{flex:1;height:36px;border-radius:var(--r-md);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--text3);transition:all .2s}
.pip.active{background:var(--blue-bg);border:1.5px solid var(--blue);color:var(--blue-text)}
.pip.unavail{opacity:.2}
.dims{display:flex;gap:8px;margin-bottom:12px}
.dim{background:var(--bg3);border-radius:var(--r-md);padding:10px 12px;flex:1}
.diml{font-size:11px;color:var(--text3);margin-bottom:3px}
.dimv{font-size:15px;font-weight:500;color:var(--text)}
.note{background:#1e1a14;border:0.5px solid rgba(239,159,39,0.2);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.55;display:flex;gap:8px;align-items:flex-start}
.ni{color:var(--warn);flex-shrink:0;font-weight:700;margin-top:1px}
.footer{margin-top:1.75rem;text-align:center;font-size:11px;color:var(--text3);line-height:1.7}
</style>
</head>

      <div>
        <div class="logo-name">MEsports</div>

    </div>
    <div class="badge"><i class="ti ti-star" aria-hidden="true"></i>300 отзывов</div>
  </div>

  <p class="slbl">Параметры</p>
  <div class="params">
    <div class="pb">
      <div class="pl">Рост</div>
      <div class="pv" id="hval">175 <span class="pu">см</span></div>
      <input type="range" class="pslider" min="150" max="205" step="1" value="175" id="hs" oninput="sH('s')">
      <input type="number" class="pnum" min="150" max="205" value="175" id="hn" onchange="sH('n')" onblur="sH('n')">
    </div>
    <div class="pb">
      <div class="pl">Вес</div>
      <div class="pv" id="wval">70 <span class="pu">кг</span></div>
      <input type="range" class="pslider" min="50" max="130" step="1" value="70" id="ws" oninput="sW('s')">
      <input type="number" class="pnum" min="50" max="130" value="70" id="wn" onchange="sW('n')" onblur="sW('n')">
    </div>
  </div>

  <p class="slbl">Посадка</p>
  <div class="fprow">
    <button class="fpb" data-p="-1" onclick="setP(this)">Плотно</button>
    <button class="fpb active" data-p="0" onclick="setP(this)">Нормально</button>
    <button class="fpb" data-p="1" onclick="setP(this)">Свободно</button>
  </div>

  <p class="slbl">Категория</p>
  <div class="catrow">
    <button class="cb active" data-cat="comp" onclick="selCat(this)"><span class="cbn">Компрессионка</span><span class="cbs">Чёрная / белая</span></button>
    <button class="cb" data-cat="camo" onclick="selCat(this)"><span class="cbn">Камуфляж</span><span class="cbs">Чёрная / серая</span></button>
    <button class="cb" data-cat="tank" onclick="selCat(this)"><span class="cbn">Майка вязаная</span><span class="cbs">Чёрная / белая</span></button>
    <button class="cb" data-cat="shorts" onclick="selCat(this)"><span class="cbn">Шорты</span><span class="cbs">Чёрные / серые</span></button>
  </div>

  <div id="result-area"></div>

  <div class="footer">MEsports · Avito · 1000+ успешных сделок · 300+ отзывов</div>

<script>
const DIMS={comp:{M:[66,44],L:[69,45],XL:[71,46],"2XL":[73,48],"3XL":[74,50]},camo:{M:[68,50],L:[70,52],XL:[72,54],"2XL":[74,56],"3XL":[76,58]},tank:{M:[64,48],L:[67,50],XL:[70,53],"2XL":[73,55]},shorts:{M:[46,33],L:[49,36],XL:[51,38],"2XL":[53,39],"3XL":[55,41]}};
const NAMES={comp:"Компрессионная футболка UA",camo:"Футболка UA камуфляж",tank:"Майка UA вязаная",shorts:"Шорты UA"};
const COLORS={comp:"Чёрная / белая",camo:"Чёрная / серая",tank:"Чёрная / белая",shorts:"Чёрные / серые"};
const DLABELS={comp:["Длина","Ширина подм."],camo:["Длина","Ширина подм."],tank:["Длина","Ширина подм."],shorts:["Длина","Ширина пояса"]};
const ALL=["M","L","XL","2XL","3XL"];
let cat="comp",pref=0,prevSz="";

function getIdx(c,h,w){
  if(c==="comp")return w<=65?0:w<=75?1:w<=85?2:w<=95?3:4;
  if(c==="camo")return Math.max(w<=65?0:w<=75?1:w<=83?2:w<=92?3:4,h<=174?0:h<=181?1:h<=186?2:h<=192?3:4);
  if(c==="tank")return Math.max(w<=60?0:w<=70?1:w<=80?2:3,h<=174?0:h<=180?1:h<=186?2:3);
  return Math.max(w<=60?0:w<=70?1:w<=78?2:w<=88?3:4,h<=172?0:h<=179?1:h<=184?2:h<=191?3:4);
}
function getSize(c,h,w,p){const av=Object.keys(DIMS[c]);return av[Math.max(0,Math.min(getIdx(c,h,w)+p,av.length-1))];}
function getFit(c,sz,h,w,p){
  if(p===-1)return{l:"Плотная посадка",cl:"ft"};
  if(p===1)return{l:"Свободная посадка",cl:"fl"};
  const av=Object.keys(DIMS[c]);const bi=getIdx(c,h,w);const si=av.indexOf(sz);
  if(bi===0&&si===0)return{l:"Плотная посадка",cl:"ft"};
  if(bi===av.length-1&&si===av.length-1)return{l:"Свободная посадка",cl:"fl"};
  return{l:"Нормальная посадка",cl:"fn"};
}

function render(){
  const h=parseInt(document.getElementById("hs").value);
  const w=parseInt(document.getElementById("ws").value);
  const sz=getSize(cat,h,w,pref);
  const fit=getFit(cat,sz,h,w,pref);
  const dims=DIMS[cat][sz];
  const dl=DLABELS[cat];
  const av=Object.keys(DIMS[cat]);
  const prev=document.getElementById("sbadge");
  if(prev&&prevSz!==sz){prev.classList.remove("pop");void prev.offsetWidth;prev.classList.add("pop");}
  prevSz=sz;
  document.getElementById("result-area").innerHTML=
    "<div class=\"result-card\">"+
      "<div class=\"result-top\">"+
        "<div>"+
          "<div class=\"result-name\">"+NAMES[cat]+"</div>"+
          "<div class=\"result-colors\">"+COLORS[cat]+"</div>"+
        "</div>"+
        "<div class=\"sbadge pop\" id=\"sbadge\">"+sz+"</div>"+
      "</div>"+
      "<div class=\"fit-divider\"></div>"+
      "<div class=\"fit-row\">"+
        "<span class=\"fit-lbl\">Посадка</span>"+
        "<span class=\"fchip "+fit.cl+"\">"+fit.l+"</span>"+
      "</div>"+
      "<div class=\"pips\">"+ALL.map(s=>{const a=av.includes(s);return"<div class=\"pip"+(s===sz?" active":"")+(!a?" unavail":"")+"\">"+ s+"</div>";}).join("")+"</div>"+
      "<div class=\"dims\">"+
        "<div class=\"dim\"><div class=\"diml\">"+dl[0]+"</div><div class=\"dimv\">"+dims[0]+" см</div></div>"+
        "<div class=\"dim\"><div class=\"diml\">"+dl[1]+"</div><div class=\"dimv\">"+dims[1]+" см</div></div>"+
      "</div>"+
      "<div class=\"note\">"+
        "<span class=\"ni\">!</span>"+
        "<span>На бирке азиатский размер — на 1–2 шага выше вашего. Вещь именно вашего размера.</span>"+
      "</div>"+
    "</div>";
}

function sH(src){
  if(src==="s"){
    const v=parseInt(document.getElementById("hs").value);
    document.getElementById("hn").value=v;
    document.getElementById("hval").innerHTML=v+" <span class=\"pu\">см</span>";
    render();
  } else {
    const raw=document.getElementById("hn").value;
    if(raw===""||isNaN(parseInt(raw)))return;
    let v=Math.max(150,Math.min(205,parseInt(raw)));
    document.getElementById("hn").value=v;
    document.getElementById("hs").value=v;
    document.getElementById("hval").innerHTML=v+" <span class=\"pu\">см</span>";
    render();
  }
}
function sW(src){
  if(src==="s"){
    const v=parseInt(document.getElementById("ws").value);
    document.getElementById("wn").value=v;
    document.getElementById("wval").innerHTML=v+" <span class=\"pu\">кг</span>";
    render();
  } else {
    const raw=document.getElementById("wn").value;
    if(raw===""||isNaN(parseInt(raw)))return;
    let v=Math.max(50,Math.min(130,parseInt(raw)));
    document.getElementById("wn").value=v;
    document.getElementById("ws").value=v;
    document.getElementById("wval").innerHTML=v+" <span class=\"pu\">кг</span>";
    render();
  }
}
function setP(btn){document.querySelectorAll(".fpb").forEach(b=>b.classList.remove("active"));btn.classList.add("active");pref=+btn.dataset.p;render();}
function selCat(btn){document.querySelectorAll(".cb").forEach(b=>b.classList.remove("active"));btn.classList.add("active");cat=btn.dataset.cat;render();}
render();
</script>
