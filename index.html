<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEsports — подбор размера</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #9e9d99;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --info-border: #378add;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --warn-bg: #faeeda;
    --warn-text: #854f0b;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a8a7a2;
      --text3: #6b6a66;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
      --info-bg: #0c2744;
      --info-text: #85b7eb;
      --info-border: #185fa5;
      --success-bg: #173404;
      --success-text: #97c459;
      --warn-bg: #412402;
      --warn-text: #ef9f27;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text);
  }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .version {
    font-size: 11px;
    color: var(--text3);
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .params {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .param-block {
    background: var(--bg2);
    border-radius: var(--radius-lg);
    padding: 14px;
  }

  .param-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .param-val {
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .param-unit {
    font-size: 14px;
    font-weight: 400;
    color: var(--text3);
  }

  input[type=range] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    cursor: pointer;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.75rem;
  }

  .cat-btn {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 12px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
  }

  .cat-btn.active {
    border: 2px solid var(--info-border);
    background: var(--info-bg);
  }

  .cat-icon {
    font-size: 20px;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .cat-btn.active .cat-icon { color: var(--info-text); }

  .cat-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: block;
  }

  .cat-btn.active .cat-name { color: var(--info-text); }

  .cat-sub {
    font-size: 11px;
    color: var(--text3);
    display: block;
    margin-top: 2px;
  }

  .result-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 10px;
  }

  .result-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .result-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .result-colors {
    font-size: 12px;
    color: var(--text3);
    margin-top: 3px;
  }

  .size-badge {
    font-size: 40px;
    font-weight: 500;
    color: var(--info-text);
    line-height: 1;
  }

  .fit-divider {
    height: 0.5px;
    background: var(--border);
    margin-bottom: 12px;
  }

  .fit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .fit-lbl {
    font-size: 12px;
    color: var(--text2);
  }

  .fit-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: var(--radius-md);
  }

  .fit-tight { background: var(--warn-bg); color: var(--warn-text); }
  .fit-normal { background: var(--success-bg); color: var(--success-text); }
  .fit-loose { background: var(--bg3); color: var(--text2); }

  .sizes-row {
    display: flex;
    gap: 5px;
    margin-bottom: 12px;
  }

  .size-pip {
    flex: 1;
    height: 38px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
  }

  .size-pip.active {
    background: var(--info-bg);
    border: 1.5px solid var(--info-border);
    color: var(--info-text);
  }

  .size-pip.unavail { opacity: .3; }

  .dims-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .dim-cell {
    background: var(--bg2);
    border-radius: var(--radius-md);
    padding: 10px 12px;
  }

  .dim-lbl {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 3px;
  }

  .dim-val {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .note-box {
    background: var(--warn-bg);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--warn-text);
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.5;
  }

  .note-box i { flex-shrink: 0; font-size: 15px; margin-top: 1px; }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  .all-list { display: flex; flex-direction: column; }

  .all-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    gap: 8px;
  }

  .all-row:last-child { border-bottom: none; }

  .all-icon { font-size: 16px; color: var(--text3); width: 20px; }

  .all-cat {
    font-size: 14px;
    color: var(--text2);
    flex: 1;
  }

  .all-size {
    font-size: 18px;
    font-weight: 500;
    color: var(--info-text);
    min-width: 44px;
    text-align: right;
  }

  .all-fit {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: var(--radius-md);
    min-width: 60px;
    text-align: center;
  }

  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">MEsports</span>
    </div>
    <span class="version">Подбор размера</span>
  </div>

  <p class="section-title">Параметры</p>
  <div class="params">
    <div class="param-block">
      <div class="param-label">Рост</div>
      <div class="param-val" id="hval">175 <span class="param-unit">см</span></div>
      <input type="range" min="150" max="205" step="1" value="175" id="hslider" oninput="onSlide()">
    </div>
    <div class="param-block">
      <div class="param-label">Вес</div>
      <div class="param-val" id="wval">70 <span class="param-unit">кг</span></div>
      <input type="range" min="50" max="130" step="1" value="70" id="wslider" oninput="onSlide()">
    </div>
  </div>

  <p class="section-title">Категория</p>
  <div class="cat-grid">
    <button class="cat-btn active" data-cat="comp" onclick="selectCat(this)">
      <div class="cat-icon"><i class="ti ti-run" aria-hidden="true"></i></div>
      <span class="cat-name">Компрессионка</span>
      <span class="cat-sub">Чёрная / белая</span>
    </button>
    <button class="cat-btn" data-cat="camo" onclick="selectCat(this)">
      <div class="cat-icon"><i class="ti ti-shirt" aria-hidden="true"></i></div>
      <span class="cat-name">Камуфляж</span>
      <span class="cat-sub">Чёрная / серая</span>
    </button>
    <button class="cat-btn" data-cat="tank" onclick="selectCat(this)">
      <div class="cat-icon"><i class="ti ti-urgent" aria-hidden="true"></i></div>
      <span class="cat-name">Майка вязаная</span>
      <span class="cat-sub">Чёрная / белая</span>
    </button>
    <button class="cat-btn" data-cat="shorts" onclick="selectCat(this)">
      <div class="cat-icon"><i class="ti ti-waves" aria-hidden="true"></i></div>
      <span class="cat-name">Шорты</span>
      <span class="cat-sub">Чёрные / серые</span>
    </button>
  </div>

  <div id="result-area"></div>

  <div class="divider"></div>
  <p class="section-title">Все категории сразу</p>
  <div class="all-list" id="all-list"></div>

  <div class="footer">
    Размеры ориентировочные. На бирке — азиатская сетка.<br>MEsports · 1000+ успешных сделок на Avito
  </div>

</div>

<script>
const DIMS = {
  comp:   {M:[66,44], L:[69,45], XL:[71,46], '2XL':[73,48], '3XL':[74,50]},
  camo:   {M:[68,50], L:[70,52], XL:[72,54], '2XL':[74,56], '3XL':[76,58]},
  tank:   {M:[64,48], L:[67,50], XL:[70,53], '2XL':[73,55]},
  shorts: {M:[46,33], L:[49,36], XL:[51,38], '2XL':[53,39], '3XL':[55,41]}
};
const NAMES = {comp:'Компрессионная футболка UA', camo:'Футболка UA камуфляж', tank:'Майка UA вязаная', shorts:'Шорты UA'};
const COLORS = {comp:'Чёрная / белая', camo:'Чёрная / серая', tank:'Чёрная / белая', shorts:'Чёрные / серые'};
const DLABELS = {comp:['Длина','Ширина подм.'], camo:['Длина','Ширина подм.'], tank:['Длина','Ширина подм.'], shorts:['Длина','Ширина пояса']};
const ICONS = {comp:'ti-run', camo:'ti-shirt', tank:'ti-urgent', shorts:'ti-waves'};
const ALL_SIZES = ['M','L','XL','2XL','3XL'];

function getSize(cat, h, w) {
  let idx;
  const wIdx = w <= 60 ? 0 : w <= 70 ? 1 : w <= 78 ? 2 : w <= 88 ? 3 : 4;
  if (cat === 'comp' || cat === 'shorts') {
    const hIdx = h <= 172 ? 0 : h <= 179 ? 1 : h <= 184 ? 2 : h <= 191 ? 3 : 4;
    idx = Math.max(hIdx, wIdx);
  } else if (cat === 'camo') {
    const wIdxC = w <= 65 ? 0 : w <= 75 ? 1 : w <= 83 ? 2 : w <= 92 ? 3 : 4;
    const hIdx = h <= 174 ? 0 : h <= 181 ? 1 : h <= 186 ? 2 : h <= 192 ? 3 : 4;
    idx = Math.max(hIdx, wIdxC);
  } else {
    const wIdxT = w <= 60 ? 0 : w <= 70 ? 1 : w <= 80 ? 2 : 3;
    const hIdx = h <= 174 ? 0 : h <= 180 ? 1 : h <= 186 ? 2 : 3;
    idx = Math.max(hIdx, wIdxT);
  }
  const avail = Object.keys(DIMS[cat]);
  idx = Math.min(idx, avail.length - 1);
  return avail[idx];
}

function getFit(cat, size, h, w) {
  const avail = Object.keys(DIMS[cat]);
  const idx = avail.indexOf(size);
  const isBottom = idx === 0;
  const isTop = idx === avail.length - 1;
  const wLow = cat === 'camo' ? 65 : 62;
  const wHigh = cat === 'camo' ? 82 : cat === 'tank' ? 76 : 80;
  if (w < wLow && h < 175) return {label:'Плотная посадка', cls:'fit-tight'};
  if ((w > wHigh || h > 185) && !isTop) return {label:'Свободная посадка', cls:'fit-loose'};
  return {label:'Нормальная посадка', cls:'fit-normal'};
}

function sizePips(cat, size) {
  const avail = Object.keys(DIMS[cat]);
  return ALL_SIZES.map(s => {
    const av = avail.includes(s);
    const active = s === size;
    return `<div class="size-pip${active?' active':''}${!av?' unavail':''}">${s}</div>`;
  }).join('');
}

let currentCat = 'comp';

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
}

function onSlide() {
  const h = parseInt(document.getElementById('hslider').value);
  const w = parseInt(document.getElementById('wslider').value);
  document.getElementById('hval').innerHTML = h + ' <span class="param-unit">см</span>';
  document.getElementById('wval').innerHTML = w + ' <span class="param-unit">кг</span>';
  render();
}

function render() {
  const h = parseInt(document.getElementById('hslider').value);
  const w = parseInt(document.getElementById('wslider').value);

  const size = getSize(currentCat, h, w);
  const fit = getFit(currentCat, size, h, w);
  const dims = DIMS[currentCat][size];
  const dl = DLABELS[currentCat];

  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-top">
        <div>
          <div class="result-name">${NAMES[currentCat]}</div>
          <div class="result-colors">${COLORS[currentCat]}</div>
        </div>
        <div class="size-badge">${size}</div>
      </div>
      <div class="fit-divider"></div>
      <div class="fit-row">
        <span class="fit-lbl">Шкала размеров</span>
        <span class="fit-tag ${fit.cls}">${fit.label}</span>
      </div>
      <div class="sizes-row">${sizePips(currentCat, size)}</div>
      <div class="dims-row">
        <div class="dim-cell"><div class="dim-lbl">${dl[0]}</div><div class="dim-val">${dims[0]} см</div></div>
        <div class="dim-cell"><div class="dim-lbl">${dl[1]}</div><div class="dim-val">${dims[1]} см</div></div>
      </div>
      ${currentCat === 'comp' ? `<div class="note-box"><i class="ti ti-info-circle"></i><span>На бирке будет азиатский размер — на 1-2 выше вашего. Это нормально.</span></div>` : ''}
    </div>`;

  const cats = ['comp','camo','tank','shorts'];
  const cnames = {comp:'Компрессионка', camo:'Камуфляж', tank:'Майка вязаная', shorts:'Шорты'};
  document.getElementById('all-list').innerHTML = cats.map(c => {
    const s = getSize(c, h, w);
    const f = getFit(c, s, h, w);
    return `<div class="all-row">
      <i class="ti ${ICONS[c]} all-icon" aria-hidden="true"></i>
      <span class="all-cat">${cnames[c]}</span>
      <span class="all-size">${s}</span>
      <span class="all-fit ${f.cls}">${f.label}</span>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
